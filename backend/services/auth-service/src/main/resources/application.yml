server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:eventzen_auth}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    # RSA key pair (base64-encoded PEM). If blank, a keypair is auto-generated on startup (dev only).
    private-key: ${JWT_PRIVATE_KEY:}
    public-key: ${JWT_PUBLIC_KEY:}
    access-token-expiry-ms: 900000 # 15 minutes
    refresh-token-expiry-ms: 604800000 # 7 days

  cors:
    allowed-origins: http://localhost:5173,http://localhost:4173,${FRONTEND_URL:http://localhost:5173}

  admin:
    email: ${ADMIN_EMAIL:admin@eventzen.com}
    password: ${ADMIN_PASSWORD:Admin@1234}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.eventzen.auth: INFO
    org.springframework.security: WARN
