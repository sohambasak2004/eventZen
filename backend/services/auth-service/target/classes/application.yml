server:
  port: ${env.SERVER_PORT:${SERVER_PORT:8081}}

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://${env.DB_HOST:localhost}:${env.DB_PORT:3306}/${env.DB_NAME:eventzen_auth}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${env.DB_USER:root}
    password: ${env.DB_PASSWORD:Soham@kol48}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    # RSA key pair (base64-encoded PEM). If blank, a keypair is auto-generated on startup (dev only).
    private-key: ${env.JWT_PRIVATE_KEY:}
    public-key: ${env.JWT_PUBLIC_KEY:}
    access-token-expiry-ms: 900000 # 15 minutes
    refresh-token-expiry-ms: 604800000 # 7 days

  cors:
    allowed-origins: http://localhost:5173,http://localhost:4173,${env.FRONTEND_URL:http://localhost:5173}

  admin:
    email: ${env.ADMIN_EMAIL:admin@eventzen.com}
    password: ${env.ADMIN_PASSWORD:Admin@1234}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.eventzen.auth: INFO
    org.springframework.security: WARN
